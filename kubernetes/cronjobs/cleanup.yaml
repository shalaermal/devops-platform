apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-job
  namespace: default
spec:
  # Ekzekutohet çdo 5 minuta (për testing)
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cleanup
            image: alpine:3.18
            command:
            - /bin/sh
            - -c
            - |
              echo "$(date): Cleaning up..."
              echo "$(date): Delete old files..."
              sleep 10
              echo "$(date): Cleanup completed successfully!"
          restartPolicy: OnFailure