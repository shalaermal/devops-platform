apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ops
  namespace: podinfo
rules:
  - apiGroups: ["", "apps", "batch"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ops-binding
  namespace: podinfo
subjects:
  - kind: User
    name: ops
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: ops
  apiGroup: rbac.authorization.k8s.io