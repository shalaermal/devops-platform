name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test & Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Security scan - Frontend
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './apps/frontend'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

    - name: Security scan - API
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './apps/api'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

    - name: Build Docker images (no push)
      run: |
        docker build -t frontend:test ./apps/frontend
        docker build -t api:test ./apps/api
        docker build -t worker:test ./apps/worker

    - name: Scan Docker images
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: 'api:test'
        severity: 'CRITICAL'
        exit-code: '0'