apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
    spec:
      containers:
      - name: ai-agent
        image: 211125687060.dkr.ecr.eu-central-1.amazonaws.com/ai-agent:latest
        ports:
        - containerPort: 8080
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: groq-api-key
              key: api-key
        - name: LOKI_URL
          value: "http://loki-gateway.monitoring.svc.cluster.local"
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: slack-webhook
              key: url
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ai-agent
  namespace: default
spec:
  selector:
    app: ai-agent
  ports:
  - port: 8080
    targetPort: 8080